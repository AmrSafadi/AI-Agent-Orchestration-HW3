name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Ruff lint (zero violations)
        run: uv run --no-project --with ruff ruff check .

      - name: Ruff format check
        run: uv run --no-project --with ruff ruff format --check .

      - name: Tests + coverage gate (>= 85%)
        env:
          PYTHONPATH: src
        run: >-
          uv run --no-project
          --with pydantic --with pytest --with pytest-cov --with matplotlib --with jinja2
          python -m pytest tests --cov --cov-report=term-missing --cov-fail-under=85
